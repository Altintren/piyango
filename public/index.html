<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sayısal Loto Tahmin</title>
  <link rel="stylesheet" href="style.css?v=7" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">

    <header>
      <div class="header-top">
        <div>
          <h1>Sayısal Loto</h1>
          <p class="subtitle">Yapay zeka destekli tahmin sistemi</p>
        </div>
        <button id="updateButton" class="btn-update">
          <span class="btn-text">Güncelle</span>
          <div id="loadingSpinner" class="spinner" style="display:none;"></div>
        </button>
      </div>
      <div id="update-status" class="update-status" style="display:none;"></div>
    </header>

    <div class="stats-bar">
      <div class="stat-item">
        <span class="stat-value" id="totalDraws">—</span>
        <span class="stat-label">Toplam Çekiliş</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <span class="stat-value" id="latestDraw">—</span>
        <span class="stat-label">Son Çekiliş</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <span class="stat-value" id="modelConfidence">—</span>
        <span class="stat-label">Model Güveni</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <span class="stat-value" id="predDate">—</span>
        <span class="stat-label">Tahmin Tarihi</span>
      </div>
    </div>

    <section class="section">
      <h2 class="section-title" id="drawDateTitle">—</h2>
      <div class="legend">
        <span class="legend-item"><span class="dot dot-main"></span> Ana Sayılar</span>
        <span class="legend-item"><span class="dot dot-joker"></span> Joker</span>
        <span class="legend-item"><span class="dot dot-super"></span> Süperstar</span>
      </div>
      <div id="predictions-container" class="predictions-grid">
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
      </div>
    </section>

    <section class="section" id="performance-section" style="display:none;">
      <h2 class="section-title">Model Performansı</h2>
      <div class="perf-grid">
        <div class="perf-card">
          <span class="perf-value" id="avgHit">—</span>
          <span class="perf-label">Ort. İsabet</span>
        </div>
        <div class="perf-card">
          <span class="perf-value" id="bestHit">—</span>
          <span class="perf-label">En İyi Skor</span>
        </div>
        <div class="perf-card">
          <span class="perf-value" id="evaluated">—</span>
          <span class="perf-label">Değerlendirilen</span>
        </div>
        <div class="perf-card">
          <span class="perf-value" id="improvement">—</span>
          <span class="perf-label">Rasgeleye Fark</span>
        </div>
      </div>
    </section>

    <section class="section" id="results-section" style="display:none;">
      <h2 class="section-title">Son Çekiliş Sonuçları</h2>
      <div id="results-container"></div>
    </section>

  </div>

  <footer>
    <p>LotoDB &copy; <span id="year"></span></p>
  </footer>

  <script src="script.js?v=7"></script>
</body>
</html>
